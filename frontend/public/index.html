<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('ccai-vibe-demo');
        var theme = 'light';
        if (raw) {
          var state = JSON.parse(raw);
          if (state.theme === 'dark' || state.theme === 'light') theme = state.theme;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/neon-logo.png" />
  <meta name="theme-color" content="#6750A4" />
  <meta name="description" content="Co-Panel" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <title>Co-Panel</title>
</head>
<body>
  <div id="root"></div>
</body>
</html>
